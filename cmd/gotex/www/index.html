<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>goTeX</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>goTeX</h1>
        <p>Session-based Tectonic builds in the browser</p>
      </div>
      <div class="actions">
        <button id="buildButton" type="button">Build</button>
        <button id="showButton" type="button" disabled>Show</button>
        <button id="downloadButton" type="button" disabled>Download</button>
      </div>
    </header>

    <section class="workspace">
      <section class="panel editor-panel">
        <label class="panel-title" for="sourceInput">TeX Source</label>
        <textarea id="sourceInput" spellcheck="false">\documentclass{article}
\begin{document}
Hallo Welt!
\end{document}
</textarea>
      </section>

      <section class="panel assets-panel">
        <div class="panel-title">Assets</div>
        <ul id="assetList" class="asset-list">
          <li class="asset-empty">No uploaded assets yet.</li>
        </ul>
        <div id="dropArea" class="drop-area">
          <p>Drop images or PDFs here</p>
          <button id="filePickerButton" type="button">Choose File</button>
          <input id="fileInput" type="file" accept=".jpg,.jpeg,.png,.pdf" multiple hidden>
        </div>
      </section>
    </section>

    <section class="panel">
      <div class="panel-title">Build Log</div>
      <pre id="logOutput" class="log-output">Ready.</pre>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
